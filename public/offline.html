<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | JobInk</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #F8FAFC;
      color: #334155;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      box-sizing: border-box;
    }
    .container {
      max-width: 400px;
      padding: 32px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      border: 1px solid #E2E8F0;
    }
    .icon {
      width: 80px;
      height: 80px;
      background-color: #f5efff;
      color: #8f3bf6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg {
      width: 40px;
      height: 40px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1E293B;
      margin: 0 0 12px;
    }
    p {
      font-size: 14px;
      color: #64748B;
      line-height: 1.6;
      margin: 0 0 24px;
    }
    button {
      background-color: #8f3bf6;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      transition: background-color 150ms;
      box-shadow: 0 2px 4px rgba(143, 59, 246, 0.2);
    }
    button:hover {
      background-color: #7723dd;
    }
    .footer {
      margin-top: 16px;
      font-size: 11px;
      color: #94A3B8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.284 16.284A3 3 0 0 0 12 17v-4m0 0V9a3 3 0 0 0-3-3H6.75M12 13h3.25a3 3 0 0 1 3 3v.25M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
      </svg>
    </div>
    <h1>Connection Lost</h1>
    <p>It looks like you're offline. Check your internet connection and try reloading the page.</p>
    <button onclick="window.location.reload()">Try Again</button>
    <div class="footer">JobInk Hyperlocal Jobs Platform</div>
  </div>
</body>
</html>
